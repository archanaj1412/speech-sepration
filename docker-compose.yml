version: '3.9'

services:
  app:
    build: .
    container_name: speech-separation
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./pretrained_models:/app/pretrained_models
      - /dev/shm:/dev/shm
    environment:
      - STREAMLIT_SERVER_MAXUPLOADSIZE=500
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    container_name: speech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge

volumes:
  redis_data: