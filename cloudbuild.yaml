steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/speech-separation-system:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/speech-separation-system:$SHORT_SHA'
      - '.'
  
  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/speech-separation-system'
  
  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=k8s-deployment.yaml'
      - '--image=gcr.io/$PROJECT_ID/speech-separation-system:$SHORT_SHA'
      - '--location=us-central1'

images:
  - 'gcr.io/$PROJECT_ID/speech-separation-system:latest'
  - 'gcr.io/$PROJECT_ID/speech-separation-system:$SHORT_SHA'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY